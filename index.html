<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service List</title>
</head>
<body>
    <p><a href="/logout">Logout</a></p>
    <hr>

    <h1>Services</h1>

    <h2>Add a service</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="price" placeholder="Price">
    <input type="text" id="description" placeholder="Description">
    <button id="addBtn">Add service</button>
    <p id="message"></p>

    <h2>Update a service</h2>
    <input type="text" id="updateId" placeholder="service _id">
    <input type="text" id="updateName" placeholder="New Name (optional)">
    <input type="number" id="updatePrice" placeholder="New Price (optional)">
    <input type="text" id="updateDescription" placeholder="New Description (optional)">
    <button id="updateBtn">Update service</button>
    <p id="updateMessage"></p>

    <h2>Delete a service</h2>
    <input type="text" id="deleteId" placeholder="service _id">
    <button id="deleteBtn">Delete service</button>
    <p id="deleteMessage"></p>

    <h2>All services</h2>
    <button id="fetchBtn">Fetch services</button>
    <div id="services"></div>

    <script>
        // POST - Add a service
        document.getElementById('addBtn').addEventListener('click', () => {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const description = document.getElementById('description').value;

            if (!name || !price) {
                document.getElementById('message').textContent = 'Name and Price are required.';
                return;
            }

            fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name,
                    price: Number(price),
                    description
                })
            })
            .then(res => {
                if (res.status === 401) {
                    window.location.href = '/login';
                    return null;
                }
                return res.json();
            })
            .then(data => {
                if (!data) return;

                document.getElementById('message').textContent = 'Service added!';
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('description').value = '';
            })
            .catch(() => {
                document.getElementById('message').textContent = 'Error adding service.';
            });
        });

        // PUT - Update a service
        document.getElementById('updateBtn').addEventListener('click', () => {
            const id = document.getElementById('updateId').value;

            if (!id) {
                document.getElementById('updateMessage').textContent = 'service _id is required.';
                return;
            }

            const updates = {};

            const name = document.getElementById('updateName').value;
            const price = document.getElementById('updatePrice').value;
            const description = document.getElementById('updateDescription').value;

            if (name) updates.name = name;
            if (price) updates.price = Number(price);
            if (description) updates.description = description;

            if (Object.keys(updates).length === 0) {
                document.getElementById('updateMessage').textContent = 'Provide at least one field to update.';
                return;
            }

            fetch(`/api/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updates)
            })
            .then(res => {
                if (res.status === 401) {
                    window.location.href = '/login';
                    return null;
                }
                return res.json();
            })
            .then(data => {
                if (!data) return;

                document.getElementById('updateMessage').textContent = 'Service updated!';
                document.getElementById('updateId').value = '';
                document.getElementById('updateName').value = '';
                document.getElementById('updatePrice').value = '';
                document.getElementById('updateDescription').value = '';
            })
            .catch(() => {
                document.getElementById('updateMessage').textContent = 'Error updating service.';
            });
        });

        // DELETE - Delete a service
        document.getElementById('deleteBtn').addEventListener('click', () => {
            const id = document.getElementById('deleteId').value;

            if (!id) {
                document.getElementById('deleteMessage').textContent = 'service _id is required.';
                return;
            }

            fetch(`/api/${id}`, {
                method: 'DELETE'
            })
            .then(res => {
                if (res.status === 401) {
                    window.location.href = '/login';
                    return null;
                }
                return res.json();
            })
            .then(data => {
                if (!data) return;

                document.getElementById('deleteMessage').textContent = 'Service deleted!';
                document.getElementById('deleteId').value = '';
            })
            .catch(() => {
                document.getElementById('deleteMessage').textContent = 'Error deleting service.';
            });
        });

        // GET - Fetch all services
        document.getElementById('fetchBtn').addEventListener('click', () => {
            fetch('/api')
            .then(res => {
                if (res.status === 401) {
                    window.location.href = '/login';
                    return null;
                }
                return res.json();
            })
            .then(services => {
                if (!services) return;

                const container = document.getElementById('services');

                if (services.length === 0) {
                    container.innerHTML = '<p>No services found.</p>';
                    return;
                }

                let html = '<ul>';

                services.forEach(service => {
                    html += `
                        <li>
                            <strong>${service.name}</strong><br>
                            Price: ${service.price}<br>
                            ${service.description ? 'Description: ' + service.description + '<br>': ''}
                            <small>_id: ${service._id}</small><br>
                            ${service.addedBy ? 'Added by: ' + service.addedBy : ''}
                        </li>
                    `;
                });

                html += '</ul>';
                container.innerHTML = html;
            })
            .catch(() => {
                document.getElementById('services').innerHTML = '<p>Error fetching services.</p>';
            });
        });
    </script>
    <style>  
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f6f8;
            color: black;
            padding: 30px;
            font-size:20px;
            display: grid;
            justify-content: center;
        }
        h1 {
            margin-bottom: 20px;
            text-align: center;
        }
        h2 {
            margin: 20px 0 10px;
            color: black;
        }

        a {
            text-decoration: none;
            color: rgb(56, 119, 255);
            cursor:pointer;
        }

        hr {
            margin: 15px 0 25px;
        }

        body > * {
            width: 700px;
            max-width: 100%;
        }

        input {
            padding: 10px;
            margin: 5px 5px 10px 0;
            border: 1px solid black;
            border-radius: 6px;
            width: 220px;
        }
        button {
            padding: 10px 16px;
            border: 1px solid black;
            background: #b3d9ff;
            color: black;
            border-radius: 6px;
            margin-top: 5px;
            cursor: pointer;
        }

        p {
            margin-top: 8px;
            font-size: 14px;
        }
        #services {
            margin-top: 20px;
        }

        ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content:center;
        }

        li {
            display:flex;
            flex-direction:column;
            border: 1px solid black;
            color: black;
            padding: 10px;
            border-radius: 8px;
            width: 300px;
            background:white;
        }

        small {
            font-size:15px;
            color: black;
            font-style:italic;
        }
</style>
    </style>
</body>
</html>
