<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - My Services</title>
</head>
<body>
    <button id="logoutBtn">Logout</button>
    <h1>My Services</h1>


    <hr>

    <!-- CREATE SERVICE -->
    <h2>Create a Service</h2>
    <form id="createServiceForm">
    <input type="text" id="name" placeholder="Service Name" required>
    <input type="number" id="price" placeholder="Price" required>
    <input type="text" id="description" placeholder="Description">
    <button type="submit">Add Service</button>
    </form>

    <p id="createMsg" style="color:green;"></p>

    <hr>

    <!-- ALL SERVICES -->
    <h2>All Services</h2>
    <div id="servicesList"></div>

    <!-- EDIT SERVICE (hidden until user clicks Edit) -->
    <div id="editSection" style="display:none;">
    <hr>

    <h2>Edit Service</h2>

    <input type="text" id="editName" placeholder="Service Name">
    <input type="number" id="editPrice" placeholder="Price">
    <input type="text" id="editDescription" placeholder="Description">

    <input type="hidden" id="editServiceId">

    <button id="saveEditBtn">Save</button>
    <button id="cancelEditBtn">Cancel</button>

    <p id="editMsg" style="color:green;"></p>
    </div>

    <script src="js/services.js"></script>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #f4f6f8;
        color: black;
        padding: 30px;
        font-size:20px;
        display: grid;
        justify-content: center;
    }
    h1 {
        margin-bottom: 20px;
        text-align: center;
    }
    h2 {
        margin: 20px 0 10px;
        color: black;
    }
    a {
        text-decoration: none;
        color: rgb(56, 119, 255);
        cursor:pointer;
    }
    hr {
        margin: 15px 0 5px;
        border:none;
        border-top:1px solid black;
    }
    br {
        margin: 0px 0 25px;
    }

    body > * {
        width: 700px;
        max-width: 100%;
    }
    input {
        padding: 10px;
        margin: 5px 5px 10px 0;
        border: 1px solid black;
        border-radius: 6px;
        width: 220px;
    }
    button {
        padding: 10px 16px;
        border: 1px solid black;
        background: #b3d9ff;
        color: black;
        border-radius: 6px;
        margin-top: 5px;
        cursor: pointer;
    }
    p {
        margin-top: 8px;
        font-size: 14px;
    }
    #servicesList {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    }

    .service {
    border: 1px solid black;
    color: #1d1919;
    padding: 20px;
    border-radius: 6px;
    width: 220px;
    }

    .service button {
        margin-top: 8px;
        margin-right: 5px;
    }
    #logoutBtn{
        width:100px;
    }
    </style>

</body>
</html>
