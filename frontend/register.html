<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
</head>
<body>
  <div class="loginBox">
    <h1>Register</h1>
    <form id="registerForm">
      <div class = "input">
        <label>Name:</label><br>
        <input type="text" id="name" required>
      </div>
      <br>
      <div class = "input">
        <label>Email:</label><br>
        <input type="text" id="email" required>
      </div>
      <br>
      <div class = "input">
        <label>Password:</label><br>
        <input type="password" id="password" required>
      </div>
      <br>
      <button id="regBtn" type="submit">Register</button>
    </form>
    <p id="errorMsg" style="color:red;"></p>
    <p id="successMsg" style="color:green;"></p>
    <p>Already made one? <a href="index.html#login">Login here</a></p>
  </div>
  <script src="js/auth.js"></script>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
      background: #b3d9ff;
      padding-top: 200px;
      font-size:20px;
    }
    h1{
      padding-bottom: 10px;
    }
    .loginBox {
      display: flex;
      flex-direction: column;
      align-items:center;
      gap: 12px;
      padding: 30px;
      border: 1px solid black;
      background: #f4f6f8;
      border-radius: 5px;
    }
    #registerForm {
      display: flex;
      align-items:center;
      flex-direction: column;
      gap: 12px;
    }
    .input{

      gap: 10px;
    }
    .input label{
      width:100px;
      text-align: left;
    }
    .input input{
      width:200px;
      padding:8px;
    }
    #regBtn {
      width:100px;
      height:30px;
      background: #b3d9ff;
      border: 1px solid black;
      border-radius: 6px;
      font-size: 15px;
    }
    a {
      color: rgb(56,119,255);
      text-decoration:none;
    }

  </style>

</body>
</html>
